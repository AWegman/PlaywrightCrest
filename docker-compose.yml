services:
  db:
    image: postgres:16-alpine
    container_name: play-right-garden-db
    # We laden de env_file ook hier in voor de POSTGRES variabelen
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-play_right_garden}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/configure-postgres.sh:/docker-entrypoint-initdb.d/02-configure.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: play-right-garden-backend
    # Koppelt je lokale .env aan de backend container
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      # Deze variabelen worden nu uit .env gehaald via env_file of defaults
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-play_right_garden}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: play-right-garden-frontend
    # Ook de frontend heeft soms .env variabelen nodig tijdens build of runtime
    env_file:
      - .env
    ports:
      - "5173:5173"
    environment:
      # Cruciaal: localhost omdat je browser (client-side) de aanroep doet
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data: